        }

            color: #ffffff;
        }

    function buscarCor() {

        div_output.innerHTML = `
            <h2 id="titulo_cor" class="titulo"></h2>

            <div id="amostra_cor"></div>

            <div class="info" id="codigo_hex"></div>

            <div class="info" id="codigo_rgb"></div>

            <div class="info" id="historia"></div>

            <div class="info" id="significado"></div>

            <div class="info" id="psicologia"></div>

            <div class="info" id="curiosidade"></div>

            <div class="info" id="emocao"></div>

            <h3> Paleta de Cores</h3>

            <div class="paleta">

                <div id="paleta1" class="cor_paleta"></div>

                <div id="paleta2" class="cor_paleta"></div>

                <div id="paleta3" class="cor_paleta"></div>

            </div>
        `;

        let corDigitada = input_cor.value.toLowerCase();

        let dados = cores[corDigitada];



        if (dados) {

            div_output.style.display = "block";

            document.body.style.backgroundColor = dados.hex;

            titulo_cor.innerHTML =
                "Sua Cor:" + " " + corDigitada.toUpperCase();

            codigo_hex.innerHTML =
                "<b>HEX:</b> " + dados.hex;

            codigo_rgb.innerHTML =
                "<b>RGB:</b> " + dados.rgb;

            historia.innerHTML =
                "<b>História:</b> " + dados.historia;

            significado.innerHTML =
                "<b>Significado:</b> " + dados.significado;

            psicologia.innerHTML =
                "<b>Psicologia:</b> " + dados.psicologia;

            curiosidade.innerHTML =
                "<b>Curiosidade:</b> " + dados.curiosidade;

            emocao.innerHTML =
                "<b>Emoções:</b> " + dados.emocao;

            amostra_cor.style.backgroundColor =
                dados.hex;

            paleta1.style.backgroundColor =
                dados.paleta[0];

            paleta2.style.backgroundColor =
                dados.paleta[1];

            paleta3.style.backgroundColor =
                dados.paleta[2];
