<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Tetris 2 Players</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b12;
    color:white;
    text-align:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    margin:10px;
}

.container{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:20px;
}

.board{
    width:200px;
    height:400px;
    background:#111;
    display:grid;
    grid-template-columns:repeat(10,1fr);
    grid-template-rows:repeat(20,1fr);
    border:2px solid #333;
}

.cell{
    border:1px solid #1a1a1a;
}

.block{
    background:#00ffcc;
}

.p1{color:#00ffcc;}
.p2{color:#ff4d6d;}

</style>
</head>

<body>

<h1>🎮 TETRIS 2 PLAYERS</h1>

<button onclick="startGame()">▶ PLAY</button>

<div class="container">

    <div>
        <h2 class="p1">Player 1</h2>
        <div>Score: <span id="score1">0</span></div>
        <div class="board" id="board1"></div>
    </div>

    <div>
        <h2 class="p2">Player 2</h2>
        <div>Score: <span id="score2">0</span></div>
        <div class="board" id="board2"></div>
    </div>

</div>

<script>

const width = 10;
const height = 20;

// boards
let board1 = Array(width*height).fill(0);
let board2 = Array(width*height).fill(0);

// scores
let score1 = 0;
let score2 = 0;

// posições das peças
let pos1 = 4;
let pos2 = 6;

let interval = null;

// DOM
const b1 = document.getElementById("board1");
const b2 = document.getElementById("board2");

// cria peça simples (quadrado 2x2)
function createPiece(board, pos){

    let index = pos;

    board[index] = 1;
    board[index+1] = 1;
    board[index+width] = 1;
    board[index+width+1] = 1;
}

// limpa peças antigas
function clearBoard(board){
    for(let i=0;i<board.length;i++){
        board[i]=0;
    }
}

// render
function draw(){

    b1.innerHTML="";
    b2.innerHTML="";

    board1.forEach(c=>{
        let div=document.createElement("div");
        div.classList.add("cell");
        if(c) div.classList.add("block");
        b1.appendChild(div);
    });

    board2.forEach(c=>{
        let div=document.createElement("div");
        div.classList.add("cell");
        if(c) div.classList.add("block");
        b2.appendChild(div);
    });

    document.getElementById("score1").innerText = score1;
    document.getElementById("score2").innerText = score2;
}

// loop do jogo
function gameLoop(){

    clearBoard(board1);
    clearBoard(board2);

    createPiece(board1,pos1);
    createPiece(board2,pos2);

    pos1 += width;
    pos2 += width;

    score1++;
    score2++;

    // reset quando chega no fim
    if(pos1 > 180) pos1 = 4;
    if(pos2 > 180) pos2 = 6;

    draw();
}

// start
function startGame(){

    if(interval) clearInterval(interval);

    interval = setInterval(gameLoop, 300);
}

// controles
document.addEventListener("keydown",(e)=>{

    if(e.key==="a") pos1 -= 1;
    if(e.key==="d") pos1 += 1;

    if(e.key==="ArrowLeft") pos2 -= 1;
    if(e.key==="ArrowRight") pos2 += 1;

    draw();
});

draw();

</script>

</body>
</html>
