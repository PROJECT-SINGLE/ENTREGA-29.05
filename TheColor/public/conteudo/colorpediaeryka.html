    // CONVERSÃO REAL RGB -> HEX

    function rgbParaHex(r, g, b) {

        function converter(valor) {

            let hex = Number(valor).toString(16);

            return hex.length === 1 ? "0" + hex : hex;
        }

        return "#" +
            converter(r) +
            converter(g) +
            converter(b);
    }



    // SALVAR CONSULTA NO BANCO

    async function salvarConsulta(usuarioId, nomeCor, rgb, hex) {

        try {

            await fetch("http://localhost:3333/cores/consulta", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    usuarioId: usuarioId,

                    nomeCor: nomeCor,

                    rgb: rgb,

                    hex: hex,

                    dataConsulta: new Date()

                })

            });

        }

        catch (erro) {

            console.log("Erro ao salvar consulta:", erro);

        }

    }



    // BUSCAR COR

    async function buscarCor() {

                <div id="paleta2" class="cor_paleta"></div>

                <div id="paleta3" class="cor_paleta"></div>

            </div>
        `;

        let dados = cores[corDigitada];



        if (dados) {

            div_output.style.display = "block";



            // RGB REAL
            let r = dados.rgbArray[0];

            let g = dados.rgbArray[1];

            let b = dados.rgbArray[2];



            // CONVERSÃO REAL
            let hexCalculado = rgbParaHex(r, g, b);



            // RGB FORMATADO
            let rgbTexto = `rgb(${r},${g},${b})`;



            // ALTERA FUNDO
            document.body.style.backgroundColor = hexCalculado;



            // EXIBE DADOS
            titulo_cor.innerHTML =
                "Sua Cor: " + corDigitada.toUpperCase();

            codigo_hex.innerHTML =
                "<b>HEX:</b> " + hexCalculado;

            codigo_rgb.innerHTML =
                "<b>RGB:</b> " + rgbTexto;

            historia.innerHTML =
                "<b>História:</b> " + dados.historia;

            significado.innerHTML =
                "<b>Significado:</b> " + dados.significado;

            psicologia.innerHTML =
                "<b>Psicologia:</b> " + dados.psicologia;

            curiosidade.innerHTML =
                "<b>Curiosidade:</b> " + dados.curiosidade;

            emocao.innerHTML =
                "<b>Emoções:</b> " + dados.emocao;



            amostra_cor.style.backgroundColor =
                hexCalculado;

            paleta1.style.backgroundColor =
                dados.paleta[0];

            paleta2.style.backgroundColor =
                dados.paleta[1];

            paleta3.style.backgroundColor =
                dados.paleta[2];

                usuarioLogado,

                corDigitada,

                rgbTexto,

                hexCalculado

            );
